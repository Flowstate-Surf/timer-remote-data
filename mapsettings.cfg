// ============================================================
// mapsettings.cfg — Executed on every map change (last to run)
// Purpose: re-assert surf settings that may have been reset by
// a map change or plugin. Only sets what actually needs to be
// confirmed post-load. Does NOT duplicate server.cfg identity
// or networking settings.
//
// WARNING: Do NOT call mp_warmup_start here. The plugin execs
// this file on RoundStart. mp_warmup_start triggers another
// RoundStart → infinite exec loop → command buffer overflow.
// ============================================================
 
sv_cheats 1
 
// --- Round / time ---
// mp_ignore_round_win_conditions: keep 1 so rounds never end on their own.
// Do NOT set mp_warmuptime or mp_warmup_end/start here — round state
// changes cause this file to be re-execed by the plugin.

mp_roundtime 29.5
mp_team_intro_time                  0
mp_round_restart_delay              10
mp_respawn_immunitytime             -1
mp_respawn_on_death_ct              1
mp_respawn_on_death_t               1
 
// --- Teams / players ---
mp_humanteam        any
mp_autoteambalance  0
mp_limitteams       0
mp_spectators_max   32
mp_playerid         0
mp_teammates_are_enemies 1
mp_solid_teammates  0
mp_solid_enemies    0
mp_friendlyfire     0
 
// --- Team names ---
mp_teamname_1 "FLOWSTATE"
mp_teamname_2 "flowstatecs.com"
 
// --- Comms ---
sv_alltalk  1
sv_deadtalk 1
sv_full_alltalk 1
 
// --- Damage (surf = no damage) ---
mp_damage_headshot_only     1
mp_damage_scale_ct_head     0.0
mp_damage_scale_t_head      0.0
mp_damage_scale_ct_body     0.0
mp_damage_scale_t_body      0.0
sv_falldamage_scale         0
 
// --- Bots ---
bot_quota   2
bot_zombie  1
bot_stop    1
bot_freeze  1
bot_dont_shoot 1
bot_chatter off
 
// --- Loadout / drops ---
mp_ct_default_secondary weapon_usp_silencer
mp_t_default_secondary  weapon_usp_silencer
mp_free_armor           0
mp_drop_knife_enable    1
mp_give_player_c4       0
mp_death_drop_c4        0
mp_death_drop_defuser   0
mp_death_drop_grenade   0
mp_death_drop_gun       1
mp_weapons_allow_map_placed 0
mp_buy_anywhere         0
mp_buy_during_immunity  0
 
// --- Economy (surf: no money, set once in server.cfg — not repeated here) ---
mp_playercashawards 0
mp_teamcashawards   0
 
// --- Map voting ---
sv_allow_votes                  0
mp_endmatch_votenextmap         0
mp_match_end_changelevel        0
mp_match_end_restart            0
mp_endmatch_votenextleveltime   20
mp_endmatch_votenextmap_keepcurrent 0
sv_vote_issue_kick_allowed      0
 
// --- Misc ---
sv_disable_radar        1
sv_ignoregrenaderadio   1
weapon_reticle_knife_show 1
r_drawviewmodel         0
sv_party_mode           0
mp_disconnect_kills_players 1
 
// --- Movement (re-asserted every map change) ---
sv_accelerate               10 //7.15 for bhop
sv_accelerate_use_weapon_speed 0
sv_airaccelerate            150 //1000 for bhop
sv_air_max_wishspeed        30 //38 for bhop
sv_enablebunnyhopping       1
sv_autobunnyhopping         1
sv_friction                 5.2
sv_gravity                  800.0
sv_jump_impulse             301.993377
sv_jump_precision_enable    false
sv_ladder_scale_speed       1.0
sv_maxspeed                 350.0
sv_maxvelocity              3500
sv_staminajumpcost          0.0
sv_staminalandcost          0.0
sv_staminamax               0.0
sv_staminarecoveryrate      0.0
sv_timebetweenducks         0.0
sv_wateraccelerate          10.0
sv_subtick_movement_view_angles 0
sv_legacy_jump              true
engine_frametime_warnings_enable 0
 
sv_cheats 0
 
echo "[Flowstate] mapsettings.cfg applied"
