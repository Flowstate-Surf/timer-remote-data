// ============================================================
// server.cfg — Persistent server config, loaded after autoexec.cfg
// Execution order:
//   1. exec gamemode_competitive.cfg  (Valve competitive baseline)
//   2. Override everything below for surf
// mapsettings.cfg handles per-map-change settings separately.
// ============================================================

// --- Bans (must be first so they're processed before clients connect) ---
exec banned_user.cfg
exec banned_ip.cfg

// --- Network ---
sv_lan          0
sv_region       0
sv_minrate      128000
sv_maxrate      0
fps_max         0

// --- Identity ---
hostname        "Flowstatecs.com Surf | DEV | Centerspeed | !replays| !Styles"
sv_tags         ""
rcon_password   ""
ip              64.40.8.21

// --- Load competitive as baseline, then override below ---
exec gamemode_competitive.cfg
echo "[Flowstate] gamemode_competitive.cfg loaded as baseline"

// Allow restricted cvars for server setup
sv_cheats 1
echo "[Flowstate] sv_cheats 1 — configuring server"

// --- Game type / mode / mapgroup (surf custom) ---
game_type   3
game_mode   0
mapgroup    mg_surf
echo "[Flowstate] game type/mode set for surf"

// --- Server behaviour ---
mp_autokick                 0
sv_hibernate_when_empty     0
sv_hibernate_postgame_delay 0

// --- Teams ---
mp_limitteams       0
mp_autoteambalance  0
mp_humanteam        T
mp_spectators_max   64

// --- Comms (surf = full alltalk) ---
sv_alltalk          1
sv_deadtalk         1
sv_full_alltalk     1
sv_talk_enemy_dead  1
sv_talk_enemy_living 1
sv_allchat          1
sv_spec_hear        1
sv_voiceenable      1
tv_relayvoice       1
echo "[Flowstate] alltalk enabled"

// --- Round / time (one endless round per map) ---
mp_warmup_start
mp_timelimit                        4
mp_roundtime                        30
mp_roundtime_defuse                 4
mp_roundtime_hostage                3
mp_maxrounds                        0
mp_freezetime                       0
mp_halftime                         0
mp_halftime_duration                0
mp_match_can_clinch                 0
mp_overtime_enable                  0
mp_ignore_round_win_conditions      1
mp_warmuptime                       60
mp_warmuptime_all_players_connected 0
mp_endwarmup_player_count 1
mp_warmup_end
mp_team_intro_time                  0
mp_round_restart_delay              10
mp_respawn_immunitytime             -1
mp_respawn_on_death_ct              1
mp_respawn_on_death_t               1
echo "[Flowstate] one-round settings configured"

// --- Map voting ---
sv_allow_votes                  1
mp_endmatch_votenextmap         1
mp_match_end_changelevel        1
mp_match_end_restart            0
mp_endmatch_votenextleveltime   20
mp_endmatch_votenextmap_keepcurrent 0
mp_default_team_winner_no_objective 1
echo "[Flowstate] map voting configured"

// --- Bots (replay bot only — zombie/stopped/frozen) ---
bot_quota   0
bot_zombie  1
bot_stop    1
bot_freeze  1
bot_chatter off

// --- Loadout ---
mp_ct_default_secondary weapon_usp_silencer
mp_t_default_secondary  weapon_usp_silencer
mp_free_armor           2
mp_drop_knife_enable    1
mp_buy_anywhere         0
mp_buytime              0
mp_give_player_c4       0

// --- Drop settings ---
mp_death_drop_c4        0
mp_death_drop_defuser   0
mp_death_drop_grenade   0
mp_death_drop_gun       1
mp_weapons_allow_map_placed 0
mp_disconnect_kills_players 1
weapon_max_before_cleanup 1
weapon_auto_cleanup_time 5
echo "[Flowstate] weapon/drop settings configured"

// --- Economy (hidden on surf) ---
mp_playercashawards 0
mp_teamcashawards   0

// --- Misc ---
mp_solid_teammates      0
mp_friendlyfire         0
sv_party_mode           0
sv_disable_radar        1
sv_ignoregrenaderadio   1
r_drawviewmodel         0
sv_falldamage_scale     0
mp_taser_recharge_time  1

// --- Movement (surf values — authoritative, set once here) ---
// airaccelerate: 150 = semi-hard (easy=400, medium=200, hard=100)
sv_accelerate               10
sv_accelerate_use_weapon_speed 1
sv_airaccelerate            150
sv_air_max_wishspeed        30
sv_enablebunnyhopping       1
sv_autobunnyhopping         1
sv_friction                 5
sv_gravity                  800
sv_jump_impulse             301.993377
sv_jump_precision_enable    false
sv_ladder_scale_speed       1
sv_maxspeed                 320
sv_maxvelocity              3500
sv_staminajumpcost          0
sv_staminalandcost          0
sv_staminamax               0
sv_staminarecoveryrate      120
sv_standable_normal         0.7
sv_timebetweenducks         0
sv_walkable_normal          0.7
sv_wateraccelerate          10
sv_subtick_movement_view_angles false
sv_legacy_jump              true
engine_frametime_warnings_enable 0
echo "[Flowstate] movement settings configured"

// --- Logging ---
log             1
sv_logecho      0
sv_logfile      0
sv_log_onefile  1

// --- Finalise ---
writeid
writeip
bot_kick
sv_lan 0
sw_adminreload
sv_cheats 0
echo "[Flowstate] sv_cheats 0 — server ready"

echo " ________ ___       ________  ___       __   ________  _________  ________  _________  _______      "
echo "|\  _____\\  \     |\   __  \|\  \     |\  \|\   ____\|\___   ___\\   __  \|\___   ___\\  ___ \     "
echo "\ \  \__/\ \  \    \ \  \|\  \ \  \    \ \  \ \  \___|\|___ \  \_\ \  \|\  \|___ \  \_\ \   __/|    "
echo " \ \   __\\ \  \    \ \  \\\  \ \  \  __\ \  \ \_____  \   \ \  \ \ \   __  \   \ \  \ \ \  \_|/__  "
echo "  \ \  \_| \ \  \____\ \  \\\  \ \  \|\__\_\  \|____|\  \   \ \  \ \ \  \ \  \   \ \  \ \ \  \_|\ \ "
echo "   \ \__\   \ \_______\ \_______\ \____________\____\_\  \   \ \__\ \ \__\ \__\   \ \__\ \ \_______\"
echo "    \|__|    \|_______|\|_______|\|____________|\_________\   \|__|  \|__|\|__|    \|__|  \|_______|"
echo "                                               \|_________|                                         "
